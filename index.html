<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Nandu ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 3em;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px #ffdde1; }
    }

    p {
      font-size: 1.5em;
      margin: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background-color: white;
      color: #ff4d6d;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff4d6d;
      color: white;
    }

    .hidden {
      display: none;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>🎉 Happy Birthday Nandu 🎂</h1>
  <p>You are my favorite person 💕</p>

  <button onclick="showMessage()">Click for Surprise 🎁</button>

  <p id="message" class="hidden">
    I love you so much ❤️<br>
    Thank you for being in my life 💖<br>
    You make everything better 🌸<br><br>
    — Yours, Tillu 💫
  </p>

  <script>
    function showMessage() {
      document.getElementById("message").classList.remove("hidden");
      createHearts();
    }

    function createHearts() {
      for (let i = 0; i < 30; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }
    }
  </script>

</body>
</html>
